<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 220px;
      background: #fff;
      color: #1a1a1a;
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 12px;
      padding: 16px;
    }
    .logo {
      font-size: 14px;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .hint {
      color: #888;
      line-height: 1.6;
    }
    .shortcut {
      display: inline-block;
      background: #f0f0f0;
      color: #1a1a1a;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
      border: 1px solid #e0e0e0;
    }
  </style>
</head>
<body>
  <div class="logo">◈ Glance</div>
  <div class="hint">
    Press <span class="shortcut">⌘⇧X</span> on any page to activate the design inspector.<br><br>
    Hover to preview · Click to pin · Esc to close
  </div>
</body>
</html>
