<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 220px;
      background: #1e1e2e;
      color: #fff;
      font-family: 'JetBrains Mono', 'SF Mono', monospace;
      font-size: 11px;
      padding: 16px;
    }
    .logo {
      font-size: 13px;
      font-weight: 700;
      color: #cba6f7;
      margin-bottom: 8px;
    }
    .hint {
      color: #585b70;
      line-height: 1.6;
    }
    .shortcut {
      display: inline-block;
      background: #313244;
      color: #fff;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 10px;
    }
  </style>
</head>
<body>
  <div class="logo">◈ Looker</div>
  <div class="hint">
    Press <span class="shortcut">⌘⇧X</span> on any page to activate the design inspector.<br><br>
    Hover to preview · Click to pin · Esc to close
  </div>
</body>
</html>
